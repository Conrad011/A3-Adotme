<main class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-paw login-icon"></i>
            <h2>Área Administrativa</h2>
            <p>Acesse o painel de gestão do Adote Já</p>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="email">Usuário</label>
                <input type="email" id="email" name="email" placeholder="Digite o nome de usuario" required>
                <i class="fas fa-user input-icon"></i>
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>
                <i class="fas fa-lock input-icon"></i>
            </div>

            <button type="button" (click)="doLogin()" class="login-cta"
                style="text-decoration: none; display: block; margin-top: 10px; box-sizing: border-box;">
                ENTRAR NO PAINEL
            </button>

        </form>

        <a [routerLink]="['/public-home']" class="back-link">
            <i class="fas fa-chevron-left"></i> Voltar ao Site Público
        </a>
    </div>
</main>
